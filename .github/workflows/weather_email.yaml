name: Weather Mail

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9,13,17,21,1 * * *" # 06:17, 10:17, 14:17, 18:17 e 22:17 no Brasil

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Send weather email
        run: npm start
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
